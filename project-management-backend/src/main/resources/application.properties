# src/main/resources/application.properties
spring.application.name=project-management

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/project_management_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Logging Configuration
logging.level.com.example.project_management_app=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type=WARN
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN

# Disable circular reference warnings
spring.main.allow-circular-references=true

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# File storage paths
file.upload-dir=${UPLOAD_DIR:./uploads}
file.profile-pictures-dir=${PROFILE_PICS_DIR:./uploads/profile-pictures}
file.team-photos-dir=${TEAM_PHOTOS_DIR:./uploads/team-photos}

# Server Configuration
server.port=${PORT:8080}
server.error.include-stacktrace=never
server.error.include-message=always

# Security Configuration
spring.security.filter.order=10

# Email configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.debug=true

# Invitation settings
app.invitation.base-url=${INVITATION_BASE_URL:http://localhost:3000}
app.invitation.secret=${INVITATION_SECRET}
app.invitation.expiration-hours=${INVITATION_EXPIRATION_HOURS:72}

# WebSocket configuration
spring.websocket.max-text-message-buffer-size=512000
spring.websocket.max-binary-message-buffer-size=512000

# DevTools configuration
spring.devtools.livereload.enabled=true
spring.devtools.restart.enabled=true

# OAuth2 Configuration
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=user:email,read:user
spring.security.oauth2.client.registration.github.redirect-uri=${GITHUB_REDIRECT_URI:http://localhost:8080/login/oauth2/code/github}

# Frontend OAuth2 redirect
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/redirect}

# OpenAI Configuration
ai.api.key=${OPENAI_API_KEY}
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-3.5-turbo
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=500

# Spring Batch auto create tables
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false
spring.batch.jdbc.table-prefix=BATCH_
